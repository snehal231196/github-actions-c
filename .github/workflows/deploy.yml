name: Deploy Knowledge Base

on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - CONTRIBUTING.md
      - LICENSE
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Use npm 9
        run: npm install -g npm@9.2.0

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npm run lint:all

      - name: Run URL checker
        run: node script/url-checker.js -t 10 -d src/posts

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.12
          cache: npm

      - name: Use npm 10
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm ci

      - name: Extract repository name
        run: echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV

      - name: Build site
        env:
          PATH_PREFIX: /${{ env.REPO_NAME }}/
        run: npm run prod

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs:
      - test
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
